# Collection history: snapshots every set's sheet into backups/ weekly.
# Git history makes each snapshot diffable — you can see exactly which
# cards were added between any two weeks, and restore any past state.
# Also runs a weekly logo-reachability check here rather than in the
# deploy pipeline, since both are external-network checks that shouldn't
# gate (or flake out) a deploy.
name: Backup collection sheets

on:
  schedule:
    - cron: "0 9 * * 1"     # every Monday 09:00 UTC
  workflow_dispatch:         # and on demand from the Actions tab

permissions:
  contents: read

jobs:
  backup:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Fetch all sheets
        run: python scripts/backup_sheets.py
      - name: Commit if changed
        run: |
          git config user.name "collection-backup[bot]"
          git config user.email "actions@github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes since last backup"
          else
            git commit -m "Weekly collection backup [skip ci]"
            git push
          fi

  check-logos:
    name: Set logo reachability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Check every set's logo resolves
        run: python scripts/check_logos.py
