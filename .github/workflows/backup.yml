# Collection history: snapshots every set's sheet into backups/ daily.
# Git history makes each snapshot diffable — you can see exactly which
# cards were added between any two weeks, and restore any past state.
name: Backup collection sheets

on:
  schedule:
    - cron: "0 9 * * *"     # every day at 09:00 UTC
  workflow_dispatch:         # and on demand from the Actions tab

permissions:
  contents: read

jobs:
  backup:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - name: Fetch all sheets
        run: python scripts/backup_sheets.py
      - name: Synchronize image manifests
        shell: bash
        run: |
          for manifest in public/img/*/manifest.txt; do
            set_id="$(basename "$(dirname "$manifest")")"
            sheet="backups/$set_id.csv"
            if [[ -f "$sheet" ]]; then
              python scripts/sync_manifest.py "$sheet" "$set_id"
            fi
          done
      - name: Validate collection backups and image manifests
        run: python scripts/validate_data.py
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "collection-backup[bot]"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain -- backups/ public/img/*/manifest.txt)" ]]; then
            echo "deployment_data_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployment_data_changed=false" >> "$GITHUB_OUTPUT"
          fi
          git add backups/ public/img/*/manifest.txt
          if git diff --cached --quiet; then
            echo "No changes since last backup"
          else
            git commit -m "Daily collection backup [skip ci]"
            git push
          fi
      - name: Deploy synchronized backups and public manifests
        if: steps.commit.outputs.deployment_data_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci-quality-deploy.yml --ref main
