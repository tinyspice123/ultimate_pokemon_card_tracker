# Tests + quality analysis + deployment pipeline
name: Tests / Security / Deploy

on:
  push:
    branches: ["main"]
    paths-ignore:
      - README.md
      - backups/**
      - template.csv
  pull_request:
    paths-ignore:
      - README.md
      - backups/**
      - template.csv
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  site-checks:
    name: Site checks (sets.js + HTML)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/
            /assets/icon-192.png
            /assets/icon-512.png
            /tests/
            /index.css
            /index.html
            /index.js
            /lib.js
            /manifest.json
            /package-lock.json
            /package.json
            /sets.js
            /sw.js
            /tracker.css
            /tracker.html
            /tracker.js

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Zero-dependency site checks
        run: node tests/ci_checks.mjs

      - name: Install coverage tool
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: lib.js unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: javascript-coverage
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  python-tests:
    name: Python tests (scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /scripts/
            /tests/
            /requirements-dev.txt
            /sets.js

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install coverage tool
        run: python -m pip install --disable-pip-version-check coverage==7.15.2

      - name: Byte-compile scripts
        run: |
          python -m py_compile \
          scripts/download_images.py \
          scripts/download_assets.py \
          scripts/backup_sheets.py \
          scripts/check_logos.py \
          scripts/sets_js.py

      - name: Unit tests with coverage
        run: |
          python -m coverage run --source=scripts -m unittest discover -s tests -v
          python -m coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: error
          retention-days: 1


  browser-tests:
    name: Browser tests / SonarQube
    needs: [site-checks, python-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/
            /assets/
            /img/
            /scripts/
            /tests/
            /index.css
            /index.html
            /index.js
            /lib.js
            /manifest.json
            /package-lock.json
            /package.json
            /playwright.config.mjs
            /requirements-dev.txt
            /sets.js
            /sonar-project.properties
            /sw.js
            /tracker.css
            /tracker.html
            /tracker.js

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run browser tests
        run: npm run test:e2e

      - name: Upload Playwright failure details
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Download JavaScript coverage
        uses: actions/download-artifact@v8
        with:
          name: javascript-coverage
          path: coverage

      - name: Download Python coverage
        uses: actions/download-artifact@v8
        with:
          name: python-coverage
          path: .

      - name: Analyze with SonarQube
        # v8.2.1, pinned to prevent a mutable tag from changing CI code.
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=tinyspice123_ultimate_pokemon_card_tracker
            -Dsonar.organization=tinyspice123
            -Dsonar.scm.provider=git
            -Dsonar.python.file.suffixes=.py
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Stage runtime files only
        if: github.event_name != 'pull_request'
        run: |
          mkdir _site
          cp index.html index.css index.js tracker.html tracker.css tracker.js sets.js lib.js sw.js manifest.json _site/
          cp -R assets img _site/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        # v5, pinned because this step is part of the trusted deployment path.
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: '_site'

  deploy:
    name: Deploy to GitHub Pages

    needs: browser-tests
    timeout-minutes: 10

    concurrency:
      group: pages
      cancel-in-progress: false

    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test deployed site
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          smoke() {
            local url="$1" output="$2"
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location --max-time 20 "$url" --output "$output"; then
                return 0
              fi
              sleep $((attempt * 2))
            done
            return 1
          }
          site_root="${SITE_URL%/}"
          smoke "$site_root/index.html" /tmp/index.html & index_pid=$!
          smoke "$site_root/tracker.html" /tmp/tracker.html & tracker_pid=$!
          smoke "$site_root/manifest.json" /dev/null & manifest_pid=$!
          smoke "$site_root/sw.js" /dev/null & worker_pid=$!
          wait "$index_pid"
          wait "$tracker_pid"
          wait "$manifest_pid"
          wait "$worker_pid"
          grep -q 'id="sets"' /tmp/index.html
          grep -q 'id="lightbox"' /tmp/tracker.html
