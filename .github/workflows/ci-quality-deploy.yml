# Tests + quality analysis + deployment pipeline
name: Tests / Security / Deploy

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  site-checks:
    name: Site checks (sets.js + HTML)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Zero-dependency site checks
        run: node tests/ci_checks.mjs

      - name: Install coverage tool
        run: npm ci --ignore-scripts

      - name: lib.js unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: javascript-coverage
          path: coverage/lcov.info

      - name: Check coverage output
        run: ls -la coverage


  python-tests:
    name: Python tests (scripts)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.14"

      - name: Byte-compile scripts
        run: |
          python -m py_compile \
          scripts/download_images.py \
          scripts/download_assets.py \
          scripts/backup_sheets.py \
          scripts/check_logos.py \
          scripts/sets_js.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v


  sonar-analysis:
    name: SonarQube Analysis
    needs: [site-checks, python-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.14"

      - name: Install coverage tools
        run: |
          npm ci --ignore-scripts
          python -m pip install coverage==7.15.2

      - name: Generate JavaScript coverage
        run: npm run test:coverage

      - name: Generate Python coverage
        run: |
          python -m coverage run --source=scripts -m unittest discover -s tests -v
          python -m coverage xml -o coverage.xml

      - name: Check coverage files exist
        run: ls -la coverage/lcov.info coverage.xml

      - name: Analyze with SonarQube
        # v8.2.1, pinned to prevent a mutable tag from changing CI code.
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=tinyspice123_ultimate_pokemon_card_tracker
            -Dsonar.organization=tinyspice123
            -Dsonar.scm.provider=git
            -Dsonar.python.file.suffixes=.py
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  deploy:
    name: Deploy to GitHub Pages

    needs: [site-checks, python-tests, sonar-analysis]

    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
