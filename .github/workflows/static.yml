# CI + Deploy pipeline: site checks and unit tests run first;
# deployment to GitHub Pages only happens when they pass.
name: CI / Deploy to Pages

on:
  push:
    branches: ["main"]
  pull_request:            # PRs get the test jobs only (no deploy)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  site-checks:
    name: Site checks (sets.js + HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Zero-dependency site checks
        run: node tests/ci_checks.mjs
      - name: lib.js unit tests
        run: node tests/lib.test.mjs

  python-tests:
    name: Python tests (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Byte-compile scripts
        run: python -m py_compile scripts/download_images.py scripts/download_assets.py scripts/backup_sheets.py scripts/check_logos.py scripts/sets_js.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  deploy:
    name: Deploy to GitHub Pages
    # gate deployment on the tests; skip entirely for pull requests
    needs: [site-checks, python-tests]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
