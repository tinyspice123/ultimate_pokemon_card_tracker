<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Vault — Pokémon TCG Collection Trackers</title>
<script src="sets.js"></script>
<style>
  :root{
    --night:#100e22; --panel:#1a1733; --panel2:#221e42; --line:#332e5c;
    --ink:#eceaf7; --dim:#8d88b0; --faint:#5b5680;
    --tera1:#7ef0d4; --tera2:#8db4ff; --tera3:#e29bff; --tera4:#ffd47e;
    --good:#7ef0d4; --miss:#ff8da1;
    --crystal:linear-gradient(120deg,var(--tera1),var(--tera2) 34%,var(--tera3) 68%,var(--tera4));
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--night);
    background-image:radial-gradient(ellipse 60% 40% at 80% -5%, rgba(141,180,255,.10), transparent),
                     radial-gradient(ellipse 50% 35% at 10% 0%, rgba(226,155,255,.08), transparent);
    color:var(--ink);
    font-family:"Sora",-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;padding:0 20px 80px;
  }
  header{max-width:900px;margin:0 auto;padding:46px 0 26px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim)}
  h1{font-family:"Unbounded","Sora",sans-serif;font-weight:700;font-size:clamp(26px,5vw,40px);margin-top:10px}
  h1 .tera{background:var(--crystal);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{color:var(--dim);font-size:14px;margin-top:8px}

  .sets{max-width:900px;margin:0 auto;display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .setcard{display:block;text-decoration:none;color:var(--ink);
    background:linear-gradient(160deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:18px;padding:22px 20px 18px;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease}
  .setcard:hover{transform:translateY(-3px);border-color:var(--tera2);
    box-shadow:0 10px 34px rgba(141,180,255,.16)}
  .setcard img{display:block;max-width:82%;max-height:88px;margin:2px auto 14px;
    filter:drop-shadow(0 4px 14px rgba(141,180,255,.3))}
  .setcard .noimg{font-family:"Unbounded",sans-serif;font-size:20px;text-align:center;margin:14px 0 18px}
  .setcard .meta{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--dim)}
  .setcard .code{letter-spacing:.14em;text-transform:uppercase}
  .setcard .prog{font-variant-numeric:tabular-nums}
  .bar{height:5px;border-radius:99px;background:var(--panel);border:1px solid var(--line);
    margin-top:10px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--crystal);width:0;transition:width .6s ease}
  footer{max-width:900px;margin:44px auto 0;text-align:center;font-size:11px;color:var(--faint)}
  footer a{color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Pokémon TCG · Master set trackers</div>
  <h1>Promo <span class="tera">Vault</span></h1>
  <div class="tagline">Pick a set to open its promo &amp; variant checklist</div>
</header>

<main class="sets" id="sets"></main>

<footer>
  Data lives in Google Sheets · add sets in <code>sets.js</code><br>
  Not affiliated with The Pokémon Company · card images © TPCi via pokemontcg.io
</footer>

<script>
const main=document.getElementById('sets');

// tiny CSV parser (quote-aware)
function csvToRows(text){
  const rows=[];let row=[],cur="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c!=='\r') cur+=c;
    }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
const OWNED_NO=new Set(["","false","no","n","-","0"]);

async function progress(cfg){
  if(!cfg.sheet) return null;
  const res=await fetch(cfg.sheet,{cache:"no-store"});
  if(!res.ok) throw 0;
  const text=await res.text();
  if(/^\s*</.test(text)) throw 0;
  const rows=csvToRows(text);
  // find header row: needs a "card"-ish and "have"-ish column
  let hi=-1,ci=-1,vi=-1,haveI=-1;
  for(let r=0;r<Math.min(rows.length,5);r++){
    const low=rows[r].map(x=>x.trim().toLowerCase());
    const c=low.findIndex(h=>h.includes("card"));
    const hv=low.findIndex(h=>h.includes("have")||h.includes("own")||h.includes("qty"));
    if(c>-1&&hv>-1){hi=r;ci=c;haveI=hv;break;}
  }
  if(hi<0) return null;
  let total=0,owned=0;
  for(let r=hi+1;r<rows.length;r++){
    const card=(rows[r][ci]||"").trim();
    if(!card) continue;           // group header / blank rows
    total++;
    const hv=(rows[r][haveI]||"").trim().toLowerCase();
    if(!OWNED_NO.has(hv)) owned++;
  }
  return {owned,total};
}

Object.entries(SETS).forEach(([id,cfg])=>{
  const a=document.createElement('a');
  a.className='setcard';
  a.href='tracker.html?set='+encodeURIComponent(id);
  const logo=cfg.logo||('https://images.pokemontcg.io/'+cfg.tcgSet+'/logo.png');
  a.innerHTML=`
    <img src="${logo}" alt="${cfg.name}"
      onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'${cfg.name.replace(/'/g,"\\'")}'}))">
    <div class="meta"><span class="code">${cfg.tcgSet}</span><span class="prog" data-prog>…</span></div>
    <div class="bar"><i data-bar></i></div>`;
  main.appendChild(a);
  progress(cfg).then(p=>{
    const t=a.querySelector('[data-prog]'), b=a.querySelector('[data-bar]');
    if(!p){ t.textContent=''; return; }
    t.textContent=`${p.owned} / ${p.total} owned`;
    b.style.width=(p.total? (100*p.owned/p.total):0)+'%';
  }).catch(()=>{ a.querySelector('[data-prog]').textContent=''; });
});
</script>
</body>
</html>
