sonar.python.version=3.14
sonar.sourceEncoding=UTF-8

sonar.sources=public,scripts
sonar.tests=tests

# Tests are nested under the project source root, so exclude them only from
# main-source indexing while retaining them through sonar.tests above.
sonar.exclusions=public/img/**,public/assets/**,**/__pycache__/**

# sets.js is declarative configuration; index.js and tracker.js are DOM entry
# points. CI syntax/schema-checks all three while behavioral coverage remains
# focused on the extracted pure logic in lib.js and the service worker.
sonar.coverage.exclusions=public/sets.js,public/index.js,public/tracker.js,public/pwa.js
